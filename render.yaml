services:
  - type: web
    name: inventory-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    rootDir: backend
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: inventory-db
          property: connectionString
      - key: CORS_ORIGINS
        value: https://dist-five-peach-52.vercel.app

databases:
  - name: inventory-db
    plan: free
